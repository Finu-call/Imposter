<meta name='viewport' content='width=device-width, initial-scale=1'/><!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Imposter Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<h1>🎭 Imposter Game</h1>

<div id="setup" class="glass">
  <input id="name" placeholder="Player name">
  <button onclick="addPlayer()">Add Player</button>

  <div id="players"></div>

  <h3>Add Custom Word</h3>
  <input id="customWord" placeholder="Enter word">
  <button onclick="addWord()">Add Word</button>

  <button onclick="startGame()">Start Game</button>
</div>

<div id="game" class="hidden glass">
  <h2 id="playerName"></h2>

  <div class="card" onclick="flipCard()">
    <div id="card" class="inner">
      <div class="front">Tap to Reveal</div>
      <div class="back" id="roleText"></div>
    </div>
  </div>

  <button onclick="next()">Next</button>
</div>

<div id="timerScreen" class="hidden glass">
  <h2>Discussion Time</h2>
  <div id="timer">60</div>
</div>

<div id="voting" class="hidden glass">
  <h2>Vote Imposter</h2>
  <div id="voteList"></div>
</div>

<div id="result" class="hidden glass">
  <h2 id="resultText"></h2>
</div>

<script src="script.js"></script>

</body>
</html><style>body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(-45deg, #0f172a, #1e293b, #312e81, #0ea5e9);
  background-size: 400% 400%;
  animation: gradient 10s ease infinite;
  color: white;
  text-align: center;
}

@keyframes gradient {
  0% {background-position: 0%}
  50% {background-position: 100%}
  100% {background-position: 0%}
}

.glass {
  backdrop-filter: blur(15px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 20px;
  margin: 20px;
}

button {
  padding: 12px 25px;
  border-radius: 12px;
  border: none;
  margin: 8px;
  background: linear-gradient(45deg, #9333ea, #3b82f6);
  color: white;
  cursor: pointer;
}

button:hover { transform: scale(1.1); }

input {
  padding: 10px;
  border-radius: 10px;
  border: none;
}

.player {
  padding: 10px;
  background: rgba(255,255,255,0.1);
  margin: 5px;
  border-radius: 10px;
}

.card {
  width: 260px;
  height: 160px;
  margin: auto;
  perspective: 1000px;
}

.inner {
  width: 100%;
  height: 100%;
  transition: transform 0.7s;
  transform-style: preserve-3d;
}

.flipped { transform: rotateY(180deg); }

.front, .back {
  position: absolute;
  width: 100%;
  height: 100%;
  border-radius: 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  backface-visibility: hidden;
}

.front { background: linear-gradient(45deg, #6366f1, #9333ea); }

.back {
  background: linear-gradient(45deg, #10b981, #3b82f6);
  transform: rotateY(180deg);
}

.hidden { display: none; }

#timer {
  font-size: 60px;
}</style><script>let players = [];
let words = [
"Apple","Car","Pizza","Beach","School","Doctor","Teacher",
"Phone","Laptop","Bus","Train","Hotel","Coffee","Music",
"Movie","Football","Cricket","Library","Mountain","Ocean"
];

let gamePlayers = [];
let index = 0;
let imposter;
let mainWord;
let fakeWord;

function addPlayer() {
  let name = document.getElementById("name").value;
  if (!name) return;

  players.push(name);

  document.getElementById("players").innerHTML =
    players.map(p => `<div class="player">${p}</div>`).join("");

  document.getElementById("name").value = "";
}

function addWord() {
  let w = document.getElementById("customWord").value;
  if (!w) return;

  words.push(w);
  alert("Word added!");
  document.getElementById("customWord").value = "";
}

function startGame() {
  mainWord = words[Math.floor(Math.random() * words.length)];
  fakeWord = words[Math.floor(Math.random() * words.length)];

  while (fakeWord === mainWord) {
    fakeWord = words[Math.floor(Math.random() * words.length)];
  }

  imposter = Math.floor(Math.random() * players.length);

  gamePlayers = players.map((p, i) => ({
    name: p,
    role: i === imposter ? fakeWord : mainWord
  }));

  document.getElementById("setup").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");

  showPlayer();
}

function showPlayer() {
  document.getElementById("card").classList.remove("flipped");

  document.getElementById("playerName").innerText =
    gamePlayers[index].name;

  document.getElementById("roleText").innerText =
    gamePlayers[index].role;
}

function flipCard() {
  document.getElementById("card").classList.toggle("flipped");
}

function next() {
  index++;
  if (index < gamePlayers.length) {
    showPlayer();
  } else {
    startTimer();
  }
}

function startTimer() {
  document.getElementById("game").classList.add("hidden");
  document.getElementById("timerScreen").classList.remove("hidden");

  let time = 60;

  let interval = setInterval(() => {
    time--;
    document.getElementById("timer").innerText = time;

    if (time <= 0) {
      clearInterval(interval);
      showVoting();
    }
  }, 1000);
}

function showVoting() {
  document.getElementById("timerScreen").classList.add("hidden");
  document.getElementById("voting").classList.remove("hidden");

  document.getElementById("voteList").innerHTML =
    gamePlayers.map((p, i) =>
      `<button onclick="vote(${i})">${p.name}</button>`
    ).join("");
}

function vote(i) {
  document.getElementById("voting").classList.add("hidden");
  document.getElementById("result").classList.remove("hidden");

  document.getElementById("resultText").innerText =
    i === imposter
      ? "🎉 Imposter Caught!"
      : "😈 Imposter Wins!";
}</script>
